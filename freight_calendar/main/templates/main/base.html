<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freight Calendar{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #92447a;
            --brand-light: #fdf6fa;
            --brand-soft: rgba(146, 68, 122, 0.05);
            --text-dark: #2d1225;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdf6fa, #ffffff, #f4f7f6);
            min-height: 100vh;
            color: var(--text-dark);
            margin: 0;
            overflow-x: hidden;
        }
        .bg-blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--brand-light);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="bg-blob" style="top: -10%; right: -10%;"></div>
    <div class="bg-blob" style="bottom: 10%; left: 10%;"></div>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
