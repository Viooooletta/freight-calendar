<h4 class="fw-bold mb-4">Рейсы на {{ date|date:"d E Y" }}</h4>

{% for plan in today_plans %}
<div class="card mb-4 border-0 shadow-sm overflow-hidden">
    <div class="card-header bg-dark text-white py-3">
        <h5 class="mb-0">🚚 {{ plan.vehicle.name }}</h5>
    </div>
    <div class="card-body p-0">
        <div class="list-group list-group-flush">
            {% for item in plan.planitem_set.all %}
            <div class="list-group-item p-3 d-flex justify-content-between align-items-center order-row {% if item.order.status == 'delivered' %}status-delivered{% elif item.order.status == 'canceled' %}status-canceled{% endif %}"
                 id="order-{{ item.order.id }}">
                <div>
                    <div class="fw-bold">{{ item.order.address }}</div>
                    <small class="text-muted">{{ item.order.weight }} кг | {{ item.order.volume }} м³</small>
                </div>
                <div class="btn-group">
                    <button type="button"
                            class="btn btn-sm btn-outline-success btn-status-update"
                            data-id="{{ item.order.id }}"
                            data-status="delivered">
                        ✅ Доставлен
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-outline-danger btn-status-update"
                            data-id="{{ item.order.id }}"
                            data-status="canceled">
                        ❌ Отмена
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% empty %}
<div class="text-center py-5">
    <p class="text-muted">На выбранный день рейсов не запланировано.</p>
</div>
{% endfor %}
