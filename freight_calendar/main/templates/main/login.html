<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Freight Calendar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-color: #92447a;
            --brand-light: #fdf6fa;
            --text-dark: #2d1225;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdf6fa, #ffffff, #f4f7f6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            margin: 0;
            color: var(--text-dark);
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(146, 68, 122, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        .icon-sm {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
        }

        h2 {
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        /* Стилизация Django формы */
        form p {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 0.8rem;
            border: 1px solid #e0e0e0;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px rgba(146, 68, 122, 0.1);
        }

        .btn-main {
            background-color: var(--brand-color);
            color: white;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 1rem;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            margin-top: 1rem;
        }

        .btn-main:hover {
            background-color: #7a3865;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(146, 68, 122, 0.2);
        }

        .footer-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--brand-color);
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .footer-links a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        /* Декоративные элементы */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--brand-light);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-blob" style="top: 15%; left: 20%;"></div>
    <div class="bg-blob" style="bottom: 15%; right: 20%;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-4 text-center">
                <div class="hero-card">
                    <span class="icon-sm">🔑</span>
                    <h2>Вход в систему</h2>

                    <form method="post">
                        {% csrf_token %}

                        {# Django автоматически вставит поля здесь #}
                        {{ form.as_p }}

                        <button type="submit" class="btn-main">
                            Войти
                        </button>
                    </form>

                    <div class="footer-links">
                        <p class="mb-1">Нет аккаунта? <a href="/register/">Зарегистрироваться</a></p>
                        <p class="mb-0"><a href="/">На главную</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
