{% extends 'main/base.html' %}

{% block title %}Вход | Freight Calendar{% endblock %}

{% block extra_css %}
<style>
    .auth-wrapper { min-height: 100vh; display: flex; align-items: center; }
    form p { text-align: left; margin-bottom: 1.2rem; }
    label { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.8rem 1.2rem; border-radius: 0.8rem; border: 1px solid #e0e0e0; transition: 0.3s; }
    input:focus { outline: none; border-color: var(--brand-color); box-shadow: 0 0 0 4px rgba(146, 68, 122, 0.1); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-4 text-center">
                <div class="hero-card">
                    <span style="font-size: 2rem; display: block; margin-bottom: 1rem;">🔑</span>
                    <h2 class="fw-bold mb-4">Вход в систему</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn-main w-100 mt-2">Войти</button>
                    </form>
                    <div class="mt-4 small">
                        <p class="mb-1">Нет аккаунта? <a href="{% url 'register' %}" class="text-decoration-none" style="color: var(--brand-color);">Зарегистрироваться</a></p>
                        <p class="mb-0"><a href="{% url 'index' %}" class="text-decoration-none text-muted">На главную</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
