<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freight Calendar{% endblock %}</title>
    <!-- Bootstrap & Google Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #92447a;
            --brand-light: #fdf6fa;
            --brand-soft: rgba(146, 68, 122, 0.05);
            --text-dark: #2d1225;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdf6fa, #ffffff, #f4f7f6);
            min-height: 100vh;
            color: var(--text-dark);
            margin: 0;
        }
        .bg-blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--brand-light);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(146, 68, 122, 0.1);
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
            position: sticky;
            top: 0;
        }
        .nav-link {
            color: var(--text-dark);
            font-weight: 600;
            padding: 1rem 1.2rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .nav-link:hover {
            background: var(--brand-soft);
            color: var(--brand-color);
            transform: translateX(5px);
        }
        .nav-link.active {
            background: var(--brand-color);
            color: white !important;
            box-shadow: 0 10px 20px rgba(146, 68, 122, 0.2);
        }
        .main-content { padding: 3rem; }

        /* Общие стили для карточек, фильтров и таблиц */
        .filter-panel, .table-card, .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 2rem;
        }
        .form-control {
            border-radius: 0.8rem;
            border: 1px solid rgba(146, 68, 122, 0.1);
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- Фоновые декоративные элементы -->
    <div class="bg-blob" style="top: -10%; right: -10%;"></div>
    <div class="bg-blob" style="bottom: 10%; left: 10%;"></div>

    <div class="container-fluid">
        <div class="row">
            <!-- Боковая панель (Sidebar) -->
            <nav class="col-md-2 sidebar d-none d-md-block">
                <div class="d-flex align-items-center mb-5 px-3">
                    <div style="background: var(--brand-light); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 12px;">
                        {% block sidebar_icon %}🚚{% endblock %}
                    </div>
                    <span class="fw-bold h5 mb-0" style="color: var(--brand-color);">FreightCal</span>
                </div>

                <div class="nav flex-column">
                    {% block sidebar_nav %}{% endblock %}

                    <div class="mt-5 pt-5">
                        <hr style="opacity: 0.1;">
                        <a href="/" class="nav-link text-danger"><span>🚪</span> Выйти</a>
                    </div>
                </div>
            </nav>

            <!-- Основной контент страницы -->
            <main class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Блок для модальных окон (удаление и т.д.) -->
    {% block modals %}{% endblock %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
