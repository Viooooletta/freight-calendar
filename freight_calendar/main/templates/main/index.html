<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Calendar | Logistics Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-color: #92447a;
            --brand-light: #fdf6fa;
            --text-dark: #2d1225;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdf6fa, #ffffff, #f4f7f6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            margin: 0;
            color: var(--text-dark);
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 4rem 3rem;
            border-radius: 2rem;
            border: 1px solid rgba(146, 68, 122, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--brand-light);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 2rem;
            color: var(--brand-color);
        }

        h1 {
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        p.lead {
            font-size: 1.1rem;
            color: #6c757d;
            line-height: 1.7;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-main {
            background-color: var(--brand-color);
            color: white;
            padding: 1rem 2.5rem;
            font-weight: 600;
            border-radius: 1rem;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-block;
        }

        .btn-main:hover {
            background-color: #7a3865;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(146, 68, 122, 0.2);
        }

        .btn-secondary-custom {
            color: var(--brand-color);
            background: transparent;
            padding: 1rem 2.5rem;
            font-weight: 600;
            border-radius: 1rem;
            border: 2px solid var(--brand-light);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary-custom:hover {
            background: var(--brand-light);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .footer-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--brand-color);
            opacity: 0.8;
        }

        /* Декоративные элементы фона */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--brand-light);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-blob" style="top: 10%; left: 10%;"></div>
    <div class="bg-blob" style="bottom: 10%; right: 10%;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-7 text-center">
                <div class="hero-card">
                    <div class="icon-box">
                        🚚
                    </div>

                    <h1 class="display-4">Freight Calendar</h1>

                    <p class="lead mb-5">
                        Управляйте логистикой без хаоса. Профессиональная платформа для координации доставок, мониторинга транспорта и автоматизации планирования.
                    </p>

                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mb-5">
                        <a href="/login/" class="btn-main">
                            Войти в портал
                        </a>
                        <a href="/register/" class="btn-secondary-custom">
                            Создать аккаунт
                        </a>
                    </div>

                    <div class="pt-4 border-top border-light">
                        <span class="footer-tag">Internal Logistics Control System</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
