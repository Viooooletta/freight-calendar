{% extends 'main/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg p-5 text-center" style="border-radius: 30px; max-width: 450px; width: 100%;">
        <div class="mb-3" style="font-size: 3rem;">🔐</div>
        <h2 class="fw-bold mb-3">Восстановление</h2>
        <p class="text-muted small mb-4">Введите ваш Gmail, и мы отправим новый пароль для входа в систему.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small rounded-3">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4 text-start">
                <label class="small fw-bold text-muted ms-2 mb-1">ВАШ EMAIL (GMAIL)</label>
                <input type="email" name="email" class="form-control bg-light border-0 p-3 shadow-sm" 
                       style="border-radius: 15px;" placeholder="example@gmail.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow" 
                    style="border-radius: 15px; background: var(--brand-color); border:none;">
                Отправить новый пароль
            </button>
        </form>

        <div class="mt-4">
            <a href="{% url 'login' %}" class="text-decoration-none small text-muted">← Вернуться ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
